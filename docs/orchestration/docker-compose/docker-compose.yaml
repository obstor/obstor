services:
  obstor:
    image: ghcr.io/obstor/obstor:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      OBSTOR_ROOT_USER: obstor
      OBSTOR_ROOT_PASSWORD: obstor123
    volumes:
      - obstor-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/obstor/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  obstor-data:
