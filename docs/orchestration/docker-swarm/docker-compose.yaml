services:
  obstor1:
    image: ghcr.io/obstor/obstor
    hostname: obstor1
    volumes:
      - obstor1-data:/export
    ports:
      - "9001:9000"
    networks:
      # On the internal you are exposed as obstor1/2/3/4 by default
      internal:  {}
      obstor_distributed:
        aliases:
          - obstor-cluster
    environment:
      OBSTOR_ROOT_USER: AKIAIOSFODNN7EXAMPLE
      OBSTOR_ROOT_PASSWORD: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    deploy:
      restart_policy:
        delay: 10s
        max_attempts: 10
        window: 60s
      placement:
        constraints:
          - node.labels.obstor1==true
    command: server http://obstor{1...4}/export
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/obstor/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

